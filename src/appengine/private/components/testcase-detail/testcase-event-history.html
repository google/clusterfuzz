<link rel="import" href="../../bower_components/iron-icon/iron-icon.html">
<link rel="import" href="../../bower_components/polymer/polymer.html">

<dom-module id="testcase-event-history">
  <link rel="import" href="../../stylesheets/main.css" type="css">
  <template>
    <style>
      :host {
        display: block;
      }

      :host table.variant {
        width: 100%;
        table-layout: fixed;
      }

      :host table.variant tr.title td {
        text-align: left;
        font-size: 14px;
        padding: 4px 6px;
        background-color: #373b50;
        color: #fff;
        border-left: 1px dotted #ccc;
        border-top: 1px dotted #ccc;
        text-transform: uppercase;
        font-weight: normal;
      }

      :host table.variant tr.title td:first-child {
        border-left: 0px;
      }

      :host table.variant tr.body td {
        padding: 4px 6px;
        font-size: 14px;
        vertical-align: top;
        border-bottom: 1px dotted #777;
        border-left: 1px dotted #777;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      :host table.variant tr.body td iron-icon {
        width: 22px;
        height: 22px;
      }

      :host table.variant tr.body td a {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #3a80b0;
      }

      :host table.variant tr.body td.event-cell {
        font-family: 'Source Code Pro', monospace;
        font-size: 13px;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

    </style>
    <div class="section">
      <div class="title" title="Testcase event history.">Event History</div>
      <template is="dom-if" if="[[info.testcase_event_history.length]]">
        <table cellpadding="0" cellspacing="0" class="variant">
          <tbody><tr class="title">
            <td style="width: 80.00%;">Event</td>
            <td style="width: 10.00%;">Download Log</td>
            <td style="width: 10.00%;">GCP Logs</td>
          </tr>
          <template is="dom-repeat" items="[[info.testcase_event_history]]" as="event">
            <tr class="body">
              <td class="event-cell">[[_formatEvent(event)]]</td>
                <td>
                <template is="dom-if" if="[[event.gcp_log_url]]">
                  <a href$="/testcase-detail/task-log?testcase_id=[[info.testcase.id]]&amp;task_id=[[event.task_id]]&amp;task_name=[[event.task_name]]">
                    <iron-icon icon="icons:cloud-download"></iron-icon>
                  </a>
                </template>
              </td>
                <td>
                <template is="dom-if" if="[[event.gcp_log_url]]">
                  <a href$="[[event.gcp_log_url]]" target="_blank" title="View logs in GCP">
                    <iron-icon icon="icons:open-in-new"></iron-icon>
                  </a>
                </template>
              </td>
            </tr>
          </template>
        </tbody></table>
      </template>
      <template is="dom-if" if="[[!info.testcase_event_history.length]]">
        <div class="body padding">
          No event history found.
        </div>
      </template>
    </div>
  </template>
  <script>
    Polymer({
      is: 'testcase-event-history',
      properties: {
        info: Object,
      },
      _formatEvent(event) {
        if (!event) {
          return '';
        }
        const eventCopy = Object.assign({}, event);
        delete eventCopy.gcp_log_url;
        const ordered = Object.keys(eventCopy).sort().reduce(
          (obj, key) => {
            obj[key] = eventCopy[key];
            return obj;
          },
          {}
        );
        return JSON.stringify(ordered).replace(/,/g, ', ');
      },
    });
  </script>
</dom-module>
