<link rel="import" href="../../bower_components/polymer/polymer.html">

<dom-module id="testcase-event-history">
  <link rel="import" href="../../stylesheets/main.css" type="css">
  <template>
    <style>
      :host {
        display: block;
      }

      :host table.variant {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
        border-bottom: 1px solid #777;
      }

      :host table.variant tr.title td {
        text-align: left;
        font-size: 14px;
        padding: 4px 6px;
        background-color: #373b50;
        color: #fff;
        border-left: 1px dotted #777;
        text-transform: uppercase;
        font-weight: normal;
      }

      :host table.variant tr.title td:first-child {
        border-left: 0px;
      }

      :host table.variant tr.body td {
        padding: 4px 6px;
        font-size: 14px;
        vertical-align: top;
        border-left: 1px dotted #777;
        border-bottom: 1px dotted #777;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      :host table.variant tr.body td:first-child {
        border-left: 0px;
      }

      :host table.variant tr.body:last-child td {
        border-bottom: 0;
      }
    </style>
    <div class="section">
      <div class="title" title="Testcase event history.">Event History</div>
      <template is="dom-if" if="[[info.testcase_event_history.length]]">
        <div class="body">
          <table cellpadding="0" cellspacing="0" class="variant">
            <tbody><tr class="title">
              <td>Event</td>
              <td>Task ID</td>
            </tr>
            <template is="dom-repeat" items="[[info.testcase_event_history]]" as="event">
              <tr class="body">
                <td><pre>[[_formatEvent(event)]]</pre></td>
                <td>[[_or(event.task_id, 'N/A')]]</td>
              </tr>
            </template>
          </tbody></table>
        </div>
      </template>
      <template is="dom-if" if="[[!info.testcase_event_history.length]]">
        <div class="body padding">
          No event history found.
        </div>
      </template>
    </div>
  </template>
  <script>
    Polymer({
      is: 'testcase-event-history',
      properties: {
        info: Object,
      },
      _formatEvent(event) {
        const eventCopy = JSON.parse(JSON.stringify(event));
        if (eventCopy.timestamp) {
          eventCopy.timestamp = new Date(eventCopy.timestamp).toUTCString();
        }
        return JSON.stringify(eventCopy, null, 2);
      },
      _or(val1, val2) {
        return val1 || val2;
      }
    });
  </script>
</dom-module>
