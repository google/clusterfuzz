<link rel="import" href="../../bower_components/polymer/polymer.html">
<link rel="import" href="../common/if-else/if-else.html">

<dom-module id="testcase-status">
  <link rel="import" href="../../stylesheets/main.css" type="css">
  <link rel="import" href="../technology/technology.css" type="css">
  <template>
    <style>
      :host {
        display: block;
      }

      :host .section .title > div {
        display: inline-block;
      }

      :host table.variant {
        width: 100%;
      }

      :host table.variant tr.title td {
        text-align: left;
        font-size: 14px;
        padding: 4px 6px;
        background-color: #373b50;
        color: #fff;
        border-left: 1px dotted #ccc;
        text-transform: uppercase;
      }

      :host table.variant tr.title td:first-child {
        border-left: 0px;
      }

      :host table.variant tr.body td {
        padding: 4px 6px;
        font-size: 14px;
        vertical-align: top;
        border-left: 1px dotted #777;
        border-bottom: 1px dotted #777;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      :host table.variant tr.body td:first-child {
        border-left: 0px;
      }

      :host table.variant tr.body:last-child td {
        border-bottom: 0px;
      }

      :host .title {
        position: relative;
        text-transform: uppercase;
        margin-top: 2px;
      }

      :host .body .title {
        text-align: center;
      }

      :host .events-title {
        margin-top: 8px;
      }

    </style>
    <div class="section">
      <div class="title">
        <div title="Events in the testcase lifecycle.">
          Testcase Status
        </div>
      </div>
      <div class="body padding">
        <div class="title" title="Last task events in the testcase lifecycle.">Task Events</div>
        <template is="dom-if" if="[[nonEmpty(taskEvents)]]">
          <table cellpadding="0" cellspacing="0" class="variant">
            <tr class="title">
              <td>Task Name</td>
              <td>Task Stage</td>
              <td>Task Status</td>
              <td>Task Outcome</td>
              <td>Time</td>
            </tr>
            <template is="dom-repeat" items="[[taskEvents]]" as="taskEvent">
              <tr class="body">
                <td>[[taskEvent.task_name]]</td>
                <td>[[taskEvent.task_stage]]</td>
                <td>[[taskEvent.task_status]]</td>
                <td>[[taskEvent.task_outcome]]</td>
                <td>[[taskEvent.timestamp]]</td>
              </tr>
            </template>
          </table>
        </template>
        <template is="dom-if" if="[[!nonEmpty(taskEvents)]]">
          <div>
            No task events found.
          </div>
        </template>

        <div class="title events-title" title="Last non task events in the testcase lifecycle.">Lifecycle Events</div>
        <template is="dom-if" if="[[nonEmpty(lifecycleEvents)]]">
          <table cellpadding="0" cellspacing="0" class="variant">
            <tr class="title">
              <td>Event Type</td>
              <td>Event Info</td>
              <td>Time</td>
            </tr>
            <template is="dom-repeat" items="[[lifecycleEvents]]" as="event">
              <tr class="body">
                <td>[[event.event_type]]</td>
                <td>[[event.event_info]]</td>
                <td>[[event.timestamp]]</td>
              </tr>
            </template>
          </table>
        </template>
        <template is="dom-if" if="[[!nonEmpty(lifecycleEvents)]]">
          <div>
            No other events found.
          </div>
        </template>
      </div>
    </div>
  </template>
  <script>
    Polymer({
      is: 'testcase-status',
      properties: {
        info: Object,
        taskEvents: {
          type: Array,
          computed: 'computeEvents(info.testcase_status_info.task_events_info)'
        },
        lifecycleEvents: {
          type: Array,
          computed: 'computeEvents(info.testcase_status_info.lifecycle_events_info)'
        },
      },
      computeEvents(eventsInfo) {
        return eventsInfo || [];
      },
      nonEmpty(items) {
        return items && items.length > 0;
      },
    });
  </script>
</dom-module>
